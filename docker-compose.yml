services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-testovoe3}
      POSTGRES_USER: ${POSTGRES_USER:-testovoe3}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testovoe3}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      APP_USERS: ${APP_USERS:-user1:12345,user2:2407041}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:?TELEGRAM_API_ID is required}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:?TELEGRAM_API_HASH is required}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?APP_ENCRYPTION_KEY is required}
      TELEGRAM_SESSIONS_DIR: ${TELEGRAM_SESSIONS_DIR:-/app/sessions}
      MEDIA_DIR: ${MEDIA_DIR:-/app/media}
      MEDIA_URL_PREFIX: ${MEDIA_URL_PREFIX:-/media}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - telegram_sessions:/app/sessions
      - media_files:/app/media

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  telegram_sessions:
  media_files:
  caddy_data:
  caddy_config:
